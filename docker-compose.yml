services:
  postgres:
    image: ankane/pgvector
    container_name: postgres-pgvector
    environment:
      POSTGRES_DB: jobready
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-jobready
    environment:
      MYSQL_DATABASE: jobready
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: jobready_user
      MYSQL_PASSWORD: jobready_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  gateway-service:
    build:
      context: .
      dockerfile: server/gateway-service/Dockerfile
    container_name: gateway-service
    env_file:
      - server/gateway-service/.env
    ports:
      - "8080:8080"
    networks:
      - app-network

  user-service:
    build:
      context: .
      dockerfile: server/user-service/Dockerfile
    container_name: user-service
    env_file:
      - server/user-service/.env
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  auth-service:
    build:
      context: .
      dockerfile: server/auth-service/Dockerfile
    container_name: auth-service
    env_file:
      - server/auth-service/.env
    ports:
      - "8082:8082"
    depends_on:
      - user-service
    networks:
      - app-network
  
  mail-service:
    build:
      context: .
      dockerfile: server/mail-service/Dockerfile
    container_name: mail-service
    env_file:
      - server/mail-service/.env
    ports:
      - "8086:8086"
    networks:
      - app-network

  cv-service:
    build:
      context: .
      dockerfile: server/cv-service/Dockerfile
    container_name: cv-service
    env_file:
      - server/cv-service/.env
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - app-network

  ai-service:
    build:
      context: .
      dockerfile: server/ai-service/Dockerfile
    container_name: ai-service
    env_file:
      - server/ai-service/.env
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      cv-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - app-network

  stats-service:
    build:
      context: .
      dockerfile: server/stats-service/Dockerfile
    container_name: stats-service
    env_file:
      - server/stats-service/.env
    ports:
      - "8087:8087"
    depends_on:
      user-service:
        condition: service_started
      cv-service:
        condition: service_started
    networks:
      - app-network

  client:
    build:
      context: client/
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SERVER_URL=http://localhost:8080
    container_name: client
    env_file:
      - client/.env
    ports:
      - "3000:3000"
    networks:
      - app-network

volumes:
  postgres_data:
  mysql_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge

